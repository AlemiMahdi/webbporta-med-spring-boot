spring.application.name=cinema

spring.datasource.url=jdbc:mysql://localhost:3306/wigell_cinema_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8583

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Wigell Cinema
info.app.version=1.0.0

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.boot.admin.client.url=http://localhost:8084
spring.boot.admin.client.instance.service-url=http://localhost:8583

spring.boot.admin.client.username=admin
spring.boot.admin.client.password=password